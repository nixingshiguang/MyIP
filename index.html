  <style>
    .jn-spinner {
      border: 4px solid rgb(12, 144, 34);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border-left-color: transparent;
      animation: spin 1s linear infinite;
    }

    .jn-loading {
      margin-top: 30vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .jn-spinner-text {
      margin-top: 10px;
      text-align: center;
    }

    .jn-spinner-text p {
      font-size: 14px;
      color: #777;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/frontend/main.js"></script>
</body>
<!-- 获取访客ip和城市 -->
<script type="text/javascript">
  function callback(data) {
    let userIp = data.ip;
    let userCity = data.province + data.city + data.area;
    user_info = [userIp, userCity];
    return user_info;
  }
</script>
