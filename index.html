<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f8f9fa">
  <meta name="background-color" content="#ffffff">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="logos/ios-logo-512.png">
  <title>My IP</title>
  <link rel="icon" href="logos/logo.svg">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <style>
    .jn-spinner {
      border: 4px solid rgb(12, 144, 34);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border-left-color: transparent;
      animation: spin 1s linear infinite;
    }

    .jn-loading {
      margin-top: 30vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .jn-spinner-text {
      margin-top: 10px;
      text-align: center;
    }

    .jn-spinner-text p {
      font-size: 14px;
      color: #777;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="jn-loading" class="jn-loading">
    <div class="jn-spinner "></div>
    <div class="jn-spinner-text">
      <p>首次加载的时间可能会较长，请等待...</p>
      <p>It may take a while for the first time, please wait...</p>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/frontend/main.js"></script>
</body>
<!-- 发送通知 -->
<script type="text/javascript" src="https://api.160621.xyz/static/notify/custom.js" defer></script>
</html>
